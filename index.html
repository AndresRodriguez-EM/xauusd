<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="XAUUSD"/>
<meta name="theme-color" content="#080C14"/>
<title>XAUUSD Journal</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080C14;--surface:#0D1421;--card:#111827;--border:#1F2D42;
  --gold:#F5A623;--gold2:#FFCC60;--green:#22C55E;--green-dim:#14532D;
  --red:#EF4444;--red-dim:#450A0A;--slate:#64748B;--muted:#94A3B8;
  --text:#E2E8F0;--white:#F8FAFC;
  --radius:14px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
#root{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;
  background:linear-gradient(180deg,rgba(245,166,35,.08) 0%,transparent 100%);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:2px;color:var(--white)}
.hdr-sub{font-size:9px;letter-spacing:3px;color:var(--slate);font-family:'JetBrains Mono',monospace;text-transform:uppercase}
.hdr-total{text-align:right}
.hdr-total-lbl{font-size:9px;letter-spacing:2px;color:var(--slate);font-family:'JetBrains Mono',monospace}
.hdr-total-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;transition:color .3s}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:11px 0;background:transparent;border:none;color:var(--slate);font-size:12px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--gold);border-bottom:2px solid var(--gold)}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* ── MONTH NAV ── */
.mnav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px}
.mnav-btn{width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mnav-btn:active{transform:scale(.92);background:var(--border)}
.mnav-center{text-align:center}
.mnav-month{font-size:22px;font-weight:800;color:var(--white);letter-spacing:1px}
.mnav-year{font-size:11px;color:var(--slate);font-family:'JetBrains Mono',monospace;letter-spacing:2px}

/* ── STRIP ── */
.strip{display:flex;margin:0 14px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.strip-item{flex:1;padding:10px 4px;text-align:center}
.strip-item+.strip-item{border-left:1px solid var(--border)}
.strip-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.strip-lbl{font-size:8px;letter-spacing:1.5px;color:var(--slate);margin-top:2px;text-transform:uppercase}

/* ── CALENDAR ── */
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);padding:0 14px;margin-bottom:3px}
.cal-dh{text-align:center;font-size:9px;font-weight:700;color:var(--slate);letter-spacing:1px;padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 14px}
.day-cell{
  aspect-ratio:1;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  transition:transform .12s,border-color .12s;position:relative;overflow:hidden;
}
.day-cell:active{transform:scale(.9)}
.day-cell.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.day-cell.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
.day-cell.win{background:var(--green-dim);border-color:#166534}
.day-cell.loss{background:var(--red-dim);border-color:#7F1D1D}
.day-num{font-size:11px;font-weight:700;color:var(--muted);font-family:'JetBrains Mono',monospace}
.day-pnl{font-size:8px;font-weight:600;margin-top:1px;font-family:'JetBrains Mono',monospace}
.day-add{font-size:15px;color:var(--border);margin-top:-1px}
.day-cell.today .day-num{color:var(--gold)}

/* ── STATS VIEW ── */
.stats-wrap{padding:14px}
.stats-section{font-size:10px;letter-spacing:2px;color:var(--slate);margin-bottom:8px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 6px;text-align:center}
.stat-icon{font-size:16px;margin-bottom:4px}
.stat-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:9px;color:var(--slate);margin-top:2px;letter-spacing:.5px}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.chart-lbl{font-size:10px;letter-spacing:2px;color:var(--slate);margin-bottom:10px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.bars{display:flex;align-items:flex-end;gap:2px;height:64px}
.bar-w{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.bar{width:100%;border-radius:2px 2px 0 0;transition:height .4s cubic-bezier(.34,1.56,.64,1);min-width:2px}
.bar-n{font-size:7px;color:var(--slate);margin-top:2px}
.trade-list{display:flex;flex-direction:column;gap:6px}
.trade-row{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;gap:10px;cursor:pointer;transition:opacity .15s}
.trade-row:active{opacity:.7}
.trade-d{font-size:11px;color:var(--slate);min-width:36px;font-family:'JetBrains Mono',monospace}
.trade-n{flex:1;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trade-p{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.empty-list{text-align:center;color:var(--border);padding:28px;font-size:12px;letter-spacing:1px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(4px)}
.modal{
  width:100%;max-width:430px;margin:0 auto;
  background:var(--surface);border-radius:24px 24px 0 0;padding:0 20px 36px;
  border:1px solid var(--border);border-bottom:none;
  animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 18px}
.modal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:800;color:var(--white)}
.modal-close{width:30px;height:30px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.type-row{display:flex;gap:8px;margin-bottom:16px}
.type-btn{
  flex:1;padding:11px 0;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--slate);font-size:12px;font-weight:700;
  cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.5px;transition:all .15s;
}
.type-btn.win-on{background:#052E16;border-color:#166534;color:var(--green)}
.type-btn.loss-on{background:var(--red-dim);border-color:#7F1D1D;color:var(--red)}
.field{margin-bottom:14px}
.field-lbl{font-size:9px;letter-spacing:2px;color:var(--slate);margin-bottom:6px;display:block;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.field-wrap{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.field-pre{padding:0 12px;color:var(--slate);font-size:16px;font-family:'JetBrains Mono',monospace}
.field-inp{
  flex:1;background:transparent;border:none;outline:none;color:var(--white);
  font-size:20px;padding:13px 12px 13px 0;font-weight:700;
  font-family:'JetBrains Mono',monospace;
}
.field-inp::placeholder{color:var(--border)}
.field-txt{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:13px;
  padding:12px;outline:none;resize:none;font-family:'Syne',sans-serif;
  line-height:1.5;
}
.field-txt::placeholder{color:var(--border)}
.modal-actions{display:flex;gap:8px;margin-top:6px}
.btn-del{
  flex:1;padding:14px 0;background:var(--red-dim);border:1px solid #7F1D1D;
  border-radius:var(--radius);color:var(--red);font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Syne',sans-serif;
}
.btn-save{
  flex:2;padding:14px 0;background:var(--gold);border:none;
  border-radius:var(--radius);color:#080C14;font-size:15px;font-weight:800;
  cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.5px;
  box-shadow:0 4px 20px rgba(245,166,35,.35);transition:transform .12s,box-shadow .12s;
}
.btn-save:active{transform:scale(.97);box-shadow:0 2px 10px rgba(245,166,35,.2)}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── State ────────────────────────────────────────────────────────────────
const SK = "xauusd26";
const today = new Date();
let S = {
  year: 2026, month: today.getMonth(),
  view: "cal", modal: null,
  form: { pnl:"", note:"", type:"win" },
  trades: (()=>{ try{ return JSON.parse(localStorage.getItem(SK)||"{}") }catch{return{}} })()
};
const save = () => localStorage.setItem(SK, JSON.stringify(S.trades));

// ── Constants ─────────────────────────────────────────────────────────────
const MES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS = ["D","L","M","X","J","V","S"];

// ── Helpers ───────────────────────────────────────────────────────────────
const dk = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const dim = (y,m) => new Date(y,m+1,0).getDate();
const fd  = (y,m) => new Date(y,m,1).getDay();
const usd = v => {
  const n=parseFloat(v); if(isNaN(n)) return "$0.00";
  const abs=Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  return (n>=0?"+$":"-$")+abs;
};
const compact = n => {
  const a=Math.abs(n);
  if(a>=1000) return (n>0?"+":"-")+"$"+(a/1000).toFixed(1)+"k";
  return (n>0?"+":"-")+"$"+a.toFixed(0);
};

// ── Stats ─────────────────────────────────────────────────────────────────
function monthStats(){
  const {year,month,trades}=S;
  const days=dim(year,month);
  const arr=[];
  for(let d=1;d<=days;d++){const t=trades[dk(year,month,d)];if(t)arr.push(t);}
  const pnl=arr.reduce((s,t)=>s+t.pnl,0);
  const wins=arr.filter(t=>t.pnl>0).length;
  const loss=arr.filter(t=>t.pnl<0).length;
  return{arr,pnl,wins,loss,wr:arr.length?Math.round(wins/arr.length*100):0,
    best:arr.length?Math.max(...arr.map(t=>t.pnl)):0,
    worst:arr.length?Math.min(...arr.map(t=>t.pnl)):0};
}
const allPnL = () => Object.values(S.trades).reduce((s,t)=>s+t.pnl,0);

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  const {year,month,view,trades,modal,form}=S;
  const st=monthStats();
  const apnl=allPnL();
  const apnlColor=apnl>=0?"var(--green)":"var(--red)";
  const pnlColor=st.pnl>=0?"var(--green)":"var(--red)";
  const days=dim(year,month);
  const first=fd(year,month);

  // Header
  let html=`
  <div class="hdr">
    <div class="hdr-logo">
      <div class="hdr-dot"></div>
      <div>
        <div class="hdr-title">XAUUSD</div>
        <div class="hdr-sub">Trading Journal</div>
      </div>
    </div>
    <div class="hdr-total">
      <div class="hdr-total-lbl">TOTAL ACUMULADO</div>
      <div class="hdr-total-val" style="color:${apnlColor}">${usd(apnl)}</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab ${view==="cal"?"on":""}" onclick="setView('cal')">📅 CALENDARIO</button>
    <button class="tab ${view==="stats"?"on":""}" onclick="setView('stats')">📊 ESTADÍSTICAS</button>
  </div>
  <div class="scroll" id="scroll">`;

  if(view==="cal"){
    html+=`
    <div class="mnav">
      <button class="mnav-btn" onclick="prevM()">‹</button>
      <div class="mnav-center">
        <div class="mnav-month">${MES[month]}</div>
        <div class="mnav-year">${year}</div>
      </div>
      <button class="mnav-btn" onclick="nextM()">›</button>
    </div>
    <div class="strip">
      <div class="strip-item">
        <div class="strip-val" style="color:${pnlColor}">${usd(st.pnl)}</div>
        <div class="strip-lbl">P&L Mes</div>
      </div>
      <div class="strip-item">
        <div class="strip-val" style="color:var(--green)">${st.wins}</div>
        <div class="strip-lbl">Wins</div>
      </div>
      <div class="strip-item">
        <div class="strip-val" style="color:var(--red)">${st.loss}</div>
        <div class="strip-lbl">Losses</div>
      </div>
      <div class="strip-item">
        <div class="strip-val" style="color:#FBBF24">${st.wr}%</div>
        <div class="strip-lbl">Win Rate</div>
      </div>
    </div>
    <div class="cal-head">${DIAS.map(d=>`<div class="cal-dh">${d}</div>`).join("")}</div>
    <div class="cal-grid">`;

    for(let i=0;i<first;i++) html+=`<div class="day-cell empty"></div>`;
    for(let d=1;d<=days;d++){
      const key=dk(year,month,d);
      const t=trades[key];
      const isW=t&&t.pnl>0, isL=t&&t.pnl<0;
      const isTod=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
      let cls="day-cell";
      if(isTod) cls+=" today";
      else if(isW) cls+=" win";
      else if(isL) cls+=" loss";
      html+=`<div class="${cls}" onclick="openModal(${d})">
        <div class="day-num">${d}</div>
        ${t?`<div class="day-pnl" style="color:${isW?"var(--green)":"var(--red)"}">${compact(t.pnl)}</div>`
           :`<div class="day-add">+</div>`}
      </div>`;
    }
    html+=`</div>`;
  }

  if(view==="stats"){
    const maxA=st.arr.length?Math.max(...st.arr.map(t=>Math.abs(t.pnl)),1):1;
    const bars=Array.from({length:days},(_,i)=>{
      const t=trades[dk(year,month,i+1)];
      const h=t?Math.max(4,Math.abs(t.pnl)/maxA*56):0;
      const bg=!t?"transparent":t.pnl>0?"var(--green)":"var(--red)";
      return `<div class="bar-w">
        <div class="bar" style="height:${h}px;background:${bg};opacity:${h?1:0.15}"></div>
        ${(i+1)%7===0?`<div class="bar-n">${i+1}</div>`:""}
      </div>`;
    }).join("");

    const rows=Array.from({length:days},(_,i)=>{
      const t=trades[dk(year,month,i+1)];
      if(!t)return"";
      const c=t.pnl>=0?"var(--green)":"var(--red)";
      return `<div class="trade-row" onclick="gotoDay(${i+1})">
        <div class="trade-d">DÍA ${String(i+1).padStart(2,"0")}</div>
        <div class="trade-n">${t.note||"—"}</div>
        <div class="trade-p" style="color:${c}">${usd(t.pnl)}</div>
      </div>`;
    }).join("");

    html+=`
    <div class="stats-wrap">
      <div class="mnav" style="padding-top:10px">
        <button class="mnav-btn" onclick="prevM()">‹</button>
        <div class="mnav-center">
          <div class="mnav-month">${MES[month]}</div>
          <div class="mnav-year">${year}</div>
        </div>
        <button class="mnav-btn" onclick="nextM()">›</button>
      </div>
      <div class="stats-section">Resumen del mes</div>
      <div class="stats-grid">
        ${sCard("💰","P&L Total",usd(st.pnl),st.pnl>=0?"var(--green)":"var(--red)")}
        ${sCard("🎯","Win Rate",st.wr+"%","#FBBF24")}
        ${sCard("📋","Trades",st.arr.length,"#818CF8")}
        ${sCard("🚀","Mejor",usd(st.best),"var(--green)")}
        ${sCard("📉","Peor",usd(st.worst),"var(--red)")}
        ${sCard("〜","Promedio",st.arr.length?usd(st.pnl/st.arr.length):"$0","var(--muted)")}
      </div>
      ${st.arr.length?`
      <div class="chart-box">
        <div class="chart-lbl">Distribución diaria</div>
        <div class="bars">${bars}</div>
      </div>`:""}
      <div class="stats-section" style="margin-top:4px">Operativas</div>
      <div class="trade-list">
        ${rows||`<div class="empty-list">SIN OPERATIVAS ESTE MES</div>`}
      </div>
    </div>`;
  }

  html+=`</div>`; // close scroll

  // Modal
  if(modal){
    const existing=trades[modal.key];
    const dname=DIAS[new Date(year,month,modal.day).getDay()];
    html+=`
    <div class="overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-top">
          <div class="modal-title">${dname} ${modal.day} · ${MES[month]}</div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="type-row">
          <button class="type-btn ${form.type==="win"?"win-on":""}" onclick="setType('win')">🟢 GANANCIA</button>
          <button class="type-btn ${form.type==="loss"?"loss-on":""}" onclick="setType('loss')">🔴 PÉRDIDA</button>
        </div>
        <div class="field">
          <span class="field-lbl">Monto USD</span>
          <div class="field-wrap">
            <span class="field-pre">$</span>
            <input class="field-inp" id="pnl-inp" type="number" inputmode="decimal" placeholder="0.00"
              value="${form.pnl}" oninput="S.form.pnl=this.value" autocomplete="off"/>
          </div>
        </div>
        <div class="field">
          <span class="field-lbl">Notas (opcional)</span>
          <textarea class="field-txt" id="note-inp" rows="3"
            placeholder="Setup, confluencias, lecciones..." 
            oninput="S.form.note=this.value">${form.note}</textarea>
        </div>
        <div class="modal-actions">
          ${existing?`<button class="btn-del" onclick="delDay()">🗑 Borrar</button>`:""}
          <button class="btn-save" onclick="saveDay()">✓ GUARDAR</button>
        </div>
      </div>
    </div>`;
  }

  document.getElementById("root").innerHTML=html;
  if(modal) setTimeout(()=>document.getElementById("pnl-inp")?.focus(),100);
}

function sCard(icon,lbl,val,color){
  return `<div class="stat-card">
    <div class="stat-icon">${icon}</div>
    <div class="stat-val" style="color:${color}">${val}</div>
    <div class="stat-lbl">${lbl}</div>
  </div>`;
}

// ── Actions ────────────────────────────────────────────────────────────────
function setView(v){S.view=v;render()}
function prevM(){S.month===0?(S.year--,S.month=11):S.month--;render()}
function nextM(){S.month===11?(S.year++,S.month=0):S.month++;render()}
function openModal(d){
  const key=dk(S.year,S.month,d);
  const ex=S.trades[key];
  S.form=ex?{pnl:String(Math.abs(ex.pnl)),note:ex.note||"",type:ex.pnl>=0?"win":"loss"}
           :{pnl:"",note:"",type:"win"};
  S.modal={day:d,key};render();
}
function closeModal(){S.modal=null;render()}
function setType(t){S.form.type=t;render()}
function saveDay(){
  const p=parseFloat(S.form.pnl);
  if(!p||isNaN(p)){alert("Ingresa un monto válido");return}
  const pnl=S.form.type==="loss"?-Math.abs(p):Math.abs(p);
  S.trades[S.modal.key]={pnl,note:S.form.note,date:S.modal.key};
  save();S.modal=null;render();
}
function delDay(){
  if(!confirm("¿Eliminar esta operativa?"))return;
  delete S.trades[S.modal.key];
  save();S.modal=null;render();
}
function gotoDay(d){S.view="cal";render();setTimeout(()=>openModal(d),80)}

render();
</script>
